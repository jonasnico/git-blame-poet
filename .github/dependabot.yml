version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    reviewers:
      - jonasnico
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
    groups:
      openai:
        patterns:
          - "openai*"
      google:
        patterns:
          - "google-*"
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    commit-message:
      prefix: "ci"
